name: Build ImmortalWrt for Cudy TR3000 v1 (24.10.6 opkg + passwall + ssr-plus + mosdns + chinadns-ng + 4G驱动 + 490MB UBI + 默认屏蔽IPv6)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget curl qemu-utils libelf-dev

      - name: Clone ImmortalWrt 24.10.6 stable
        run: |
          git clone --depth=1 --branch v24.10.6 https://github.com/immortalwrt/immortalwrt.git

      - name: Patch DTS for 490MB UBI partition (512MB flash mod)
        working-directory: immortalwrt
        run: |
          DTS_FILE=$(find target/linux/mediatek/dts -name "mt7981b-cudy-tr3000-v1.dts" | head -1)
          echo "DTS file: $DTS_FILE"
          if [ -n "$DTS_FILE" ]; then
            sed -i 's/0x4000000/0x1EA00000/g' "$DTS_FILE"
            grep -n "0x1EA00000" "$DTS_FILE" | head -10
          else
            echo "WARNING: DTS not found"
          fi

      - name: Setup feeds
        working-directory: immortalwrt
        run: |
          # SSR Plus+ (helloworld)
          echo "src-git helloworld https://github.com/fw876/helloworld.git" >> feeds.conf.default
          # PassWall (原版) + 依赖包
          echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main" >> feeds.conf.default
          echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall.git;main" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add argon theme + mosdns
        working-directory: immortalwrt
        run: |
          git clone --depth=1 https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          # MosDNS v5
          git clone --depth=1 -b v5 https://github.com/sbwml/luci-app-mosdns package/mosdns
          # 确保 geodata 可用（mosdns 常用）
          rm -rf package/v2ray-geodata 2>/dev/null || true
          git clone --depth=1 https://github.com/sbwml/v2ray-geodata package/v2ray-geodata

      - name: Write .config
        working-directory: immortalwrt
        run: |
          rm -f .config
          printf "%s\n" "CONFIG_TARGET_mediatek=y" >> .config
          printf "%s\n" "CONFIG_TARGET_mediatek_filogic=y" >> .config
          printf "%s\n" "CONFIG_TARGET_mediatek_filogic_DEVICE_cudy_tr3000-v1=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_autocore=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_base-files=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_block-mount=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_bridger=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_ca-bundle=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_default-settings-chn=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_dnsmasq=n" >> .config
          printf "%s\n" "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_dropbear=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_firewall4=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_fitblk=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_fstools=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-crypto-hw-safexcel=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-gpio-button-hotplug=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-leds-gpio=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nf-nathelper=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nf-nathelper-extra=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nft-offload=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-phy-aquantia=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_libc=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_libgcc=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_libustream-openssl=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_logd=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-package-manager=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-opkg=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-compat=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-lib-base=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-lib-ipkg=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-light=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_mtd=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_netifd=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_nftables=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_odhcp6c=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_odhcpd-ipv6only=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_opkg=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_ppp=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_ppp-mod-pppoe=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_procd-ujail=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_uboot-envtools=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_uci=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_uclient-fetch=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_urandom-seed=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_urngd=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_wpad-openssl=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb3=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-mt7915e=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-mt7981-firmware=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_mt7981-wo-firmware=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_automount=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_miniupnpd-nftables=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nft-nat=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nf-nat=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nft-core=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nft-fib=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-mii=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-net=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-net-rndis=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-storage=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-storage-uas=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-scsi-core=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-fs-ext4=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-fs-exfat=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-fs-vfat=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nls-utf8=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nls-cp437=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nls-iso8859-1=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_e2fsprogs=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nf-socket=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nft-socket=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nft-tproxy=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nf-tproxy=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-tun=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-inet-diag=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-dummy=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-nf-conntrack-netlink=y" >> .config

          # ========== 代理相关：只保留 Xray 内核 ==========
          # ShadowSocksR Plus+
          printf "%s\n" "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_NONE_V2RAY=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_V2ray=n" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ChinaDNS_NG=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_MosDNS=y" >> .config

          # PassWall（原版）- 仅 Xray，禁用 SingBox / Hysteria / NaiveProxy 等
          printf "%s\n" "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-passwall_Nftables_Transparent_Proxy=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox=n" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Hysteria=n" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-passwall_INCLUDE_NaiveProxy=n" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray_Geodata=y" >> .config

          # 核心
          printf "%s\n" "CONFIG_PACKAGE_xray-core=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_chinadns-ng=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_v2ray-geoip=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_v2ray-geosite=y" >> .config

          # MosDNS
          printf "%s\n" "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_mosdns=y" >> .config

          # 其他工具
          printf "%s\n" "CONFIG_PACKAGE_ip-full=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_curl=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_openssh-sftp-server=y" >> .config

          # 4G/5G USB Modem drivers
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-serial=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-serial-option=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-serial-wwan=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-net-cdc-ncm=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_kmod-usb-wdm=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-proto-qmi=y" >> .config
          printf "%s\n" "CONFIG_PACKAGE_luci-proto-mbim=y" >> .config

          make defconfig

      - name: Write first-boot script
        working-directory: immortalwrt
        run: |
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-custom-init.sh << 'ENDOFFILE'
          #!/bin/sh
          passwd -d root
          uci set network.lan.ipaddr='192.168.1.1'
          uci set network.lan.netmask='255.255.255.0'
          uci commit network

          # 默认屏蔽 IPv6
          uci set network.lan.ipv6='0'
          uci set network.wan.ipv6='0'
          uci -q delete network.wan6 || true
          uci set dhcp.lan.dhcpv6='disabled'
          uci set dhcp.lan.ra='disabled'
          uci set dhcp.lan.ndp='disabled'
          uci set dhcp.lan.ra_slaac='0'
          uci commit network
          uci commit dhcp
          # 系统级禁用 IPv6
          mkdir -p /etc/sysctl.d
          echo "net.ipv6.conf.all.disable_ipv6 = 1" > /etc/sysctl.d/99-disable-ipv6.conf
          echo "net.ipv6.conf.default.disable_ipv6 = 1" >> /etc/sysctl.d/99-disable-ipv6.conf
          echo "net.ipv6.conf.lo.disable_ipv6 = 1" >> /etc/sysctl.d/99-disable-ipv6.conf
          sysctl -p /etc/sysctl.d/99-disable-ipv6.conf 2>/dev/null || true

          uci set wireless.@wifi-device[0].disabled='0'
          uci set wireless.@wifi-iface[0].disabled='0'
          uci set wireless.@wifi-iface[0].ssid='Cudy'
          uci set wireless.@wifi-iface[0].encryption='none'
          uci set wireless.@wifi-device[1].disabled='0'
          uci set wireless.@wifi-iface[1].disabled='0'
          uci set wireless.@wifi-iface[1].ssid='Cudy-5G'
          uci set wireless.@wifi-iface[1].encryption='none'
          uci commit wireless
          wifi up
          uci set luci.main.mediaurlbase='/luci-static/argon'
          uci commit luci

          # === 自动添加 ImmortalWrt 官方软件源（opkg） ===
          if [ ! -f /etc/opkg/customfeeds.conf ] || ! grep -q "immortalwrt_core" /etc/opkg/customfeeds.conf 2>/dev/null; then
            cat >> /etc/opkg/customfeeds.conf << 'FEEDEOF'

          # ImmortalWrt 24.10.6 官方软件源 - 由固件自动添加
          src/gz immortalwrt_core https://downloads.immortalwrt.org/releases/24.10.6/targets/mediatek/filogic/packages
          src/gz immortalwrt_base https://downloads.immortalwrt.org/releases/24.10.6/packages/aarch64_cortex-a53/base
          src/gz immortalwrt_luci https://downloads.immortalwrt.org/releases/24.10.6/packages/aarch64_cortex-a53/luci
          src/gz immortalwrt_packages https://downloads.immortalwrt.org/releases/24.10.6/packages/aarch64_cortex-a53/packages
          FEEDEOF
            echo "ImmortalWrt feeds added to opkg"
          fi

          exit 0
          ENDOFFILE
          # 去掉 heredoc 带来的前导空格，保证脚本可执行
          sed -i 's/^[[:space:]]*//' files/etc/uci-defaults/99-custom-init.sh
          chmod +x files/etc/uci-defaults/99-custom-init.sh

      - name: Download source packages
        working-directory: immortalwrt
        run: |
          make download -j$(nproc) V=s 2>&1 | grep -E "ERROR|error" || true

      - name: Build firmware
        working-directory: immortalwrt
        run: |
          make -j$(nproc) V=s 2>&1 | tee build.log | grep -E "^(make\[|ERROR|WARNING|Compiling|Building)" || true

      - name: Check build output
        working-directory: immortalwrt
        run: |
          echo "=== Firmware files ==="
          ls -lh bin/targets/mediatek/filogic/ | grep -i "cudy\|tr3000" || ls -lh bin/targets/mediatek/filogic/
          echo "=== Key packages ==="
          find bin/packages -name "*passwall*" -o -name "*ssr-plus*" -o -name "*xray*" -o -name "*mosdns*" -o -name "*chinadns*" 2>/dev/null | head -20

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-cudy-tr3000-v1-opkg-passwall-ssrplus-mosdns-490MB
          path: |
            immortalwrt/bin/targets/mediatek/filogic/*cudy*
            immortalwrt/bin/targets/mediatek/filogic/*tr3000*
          if-no-files-found: warn
          retention-days: 14

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v24.10.6-opkg-passwall-ssrplus-mosdns-490MB-${{ github.run_number }}
          name: ImmortalWrt Cudy TR3000 v1 - 24.10.6 opkg + PassWall + SSR Plus+ + MosDNS + 仅Xray内核 + 默认屏蔽IPv6 + 490MB UBI Build ${{ github.run_number }}
          body: |
            自动编译固件（24.10.6 稳定版 - opkg 路线 + 仅 Xray 内核）

            ✅ 已预装：
            - **PassWall（原版）**：仅编译 Xray 内核（已禁用 Sing-Box / Hysteria / NaiveProxy 等）
            - **ShadowSocksR Plus+**：仅 Xray 内核
            - **MosDNS**：智能 DNS 转发
            - chinadns-ng
            - luci-app-opkg + luci-app-package-manager
            - 常见 4G/5G USB 模块驱动（qmi/mbim/serial-option 等）

            ✅ 默认屏蔽 IPv6（首次启动脚本自动执行）
               - network.lan/wan.ipv6=0
               - dhcpv6 / ra / ndp 全部 disabled
               - sysctl 禁用 IPv6

            ✅ 第一次启动自动添加 ImmortalWrt 24.10.6 官方软件源
               → 以后直接 `opkg update` 即可使用

            ✅ 针对 512MB 闪存硬改机型：
            - UBI 分区扩大到 490MB（DTS patch）
            - Argon 主题默认
            - UPnP + USB 支持 + SFTP + 完整 USB 存储/网卡驱动
            - dnsmasq-full + tproxy/nftables 完整模块

            关于内核：
            PassWall 和 SSR Plus+ 都只编译了 **xray-core**，不包含 mihomo / Sing-Box 等其他内核，体积更小、更干净。
          files: |
            immortalwrt/bin/targets/mediatek/filogic/*cudy*
            immortalwrt/bin/targets/mediatek/filogic/*tr3000*
          draft: false
          prerelease: false

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-error
          path: immortalwrt/build.log
          retention-days: 7
